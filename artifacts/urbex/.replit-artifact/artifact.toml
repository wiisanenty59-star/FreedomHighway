kind = "web"
previewPath = "/"
title = "UrbEx Explorer"
version = "1.0.0"
id = "artifacts/urbex"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25832

[services.development]
run = "pnpm --filter @workspace/urbex run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/urbex", "run", "build" ]
publicDir = "artifacts/urbex/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25832"
BASE_PATH = "/"
